[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
bytecode_hash = "none"
cbor_metadata = false
viaIR = true
evm_version = "cancun"
optimizer = true
optimizer_runs = 20_000


[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }

[fmt]
line_length = 100
number_underscore = "thousands"
sort_imports = true
tab_width = 4